version: "3"

# Compatible Git Bash (Windows), bash (Linux/macOS)
# Outils requis : bash, git, java, mvn, docker, kubectl, kustomize, task
set: ['e', 'pipefail']

vars:
  SERVICE: isp-zoho-notifier
  MVN:
    sh: command -v ./mvnw 2>/dev/null || echo mvn
  IMAGE: harbor.internal.korlu.com/korlu/isp-zoho-notifier
  KUSTOMIZE: kustomize
  NAMESPACE: isp-system   # identique pour tous les environnements
  # .env ne contient que ENV ; les autres valeurs viennent de config/{ENV}/*.properties
  ENV:
    sh: echo "${ENV:-dev}"
  KUBE_CONTEXT:
    sh: |
      CFG="config/${ENV:-dev}/global.properties"
      if [ -f "$CFG" ]; then
        . "$CFG"
        echo "${KUBE_CONTEXT:-kubernetes-admin@kubernetes}"
      else
        echo "kubernetes-admin@kubernetes"
      fi

# .env ne définit que ENV=dev|qa|preprod|prod
dotenv: [.env]

tasks:
  default:
    desc: "Afficher l'aide et la séquence d'exécution"
    cmds:
      - |
        echo ""
        echo "══════════════════════════════════════════════════════════"
        echo "  {{.SERVICE}} — Taskfile ISP Platform"
        echo "══════════════════════════════════════════════════════════"
        echo ""
        echo "  Séquence développeur :"
        echo "    task check → task compile → task build → task run"
        echo "    task clean      (nettoyer les artefacts)"
        echo ""
        echo "  Séquence publication :"
        echo "    task build → task docker → task docker:push"
        echo ""
        echo "  Séquence déploiement K8s (ENV actif = {{.ENV}}) :"
        echo "    task k8s          (dry-run overlay {{.ENV}})"
        echo "    task deploy       (deploy overlay {{.ENV}})"
        echo "  → .env contient seulement ENV=dev|qa|preprod|prod"
        echo ""
        echo "  Qualité / Sécurité :"
        echo "    task lint         (Checkstyle Google Style)"
        echo "    task semgrep:scan (SAST OWASP + Java + secrets)"
        echo "    task trivy:scan   (CVE image Docker)"
        echo ""
        echo "  Tâches disponibles :"
        echo ""
        task --list

  # ── Prérequis ─────────────────────────────────────────────────────────────
  check:
    desc: "Vérifier que tous les outils requis sont disponibles (alias check-tools)"
    cmds:
      - task: check-tools

  check-tools:
    desc: "Vérifier que tous les outils requis sont disponibles dans le PATH"
    silent: true
    cmds:
      - |
        PASS=true

        check_tool() {
          local BIN="$1" HINT="$2"
          printf "  %-16s" "$BIN"
          if command -v "$BIN" >/dev/null 2>&1; then
            echo "OK  $(command -v "$BIN")"
          else
            echo "MANQUANT — $HINT"
            PASS=false
          fi
        }

        echo ""
        echo "=== Outils requis ==="
        check_tool bash      "Git Bash requis — https://git-scm.com/downloads"
        check_tool git       "https://git-scm.com/downloads"
        check_tool java      "JDK 21+ Temurin — https://adoptium.net"
        check_tool mvn       "Maven 3.9.x — https://maven.apache.org"
        check_tool docker    "Docker Desktop — https://docker.com"
        check_tool kubectl   "https://kubernetes.io/docs/tasks/tools/"
        check_tool kustomize "choco install kustomize"
        check_tool task      "https://taskfile.dev/installation/"

        echo ""
        echo "=== Contexte actif (.env) ==="
        GLOBAL_CFG="config/{{.ENV}}/global.properties"
        if [ -f "$GLOBAL_CFG" ]; then
          set -a
          . "$GLOBAL_CFG"
          set +a
        fi
        echo "  ENV              = {{.ENV}}  (défaut: dev — surcharger dans .env)"
        echo "  NAMESPACE        = {{.NAMESPACE}}  (fixe — tous les envs)"
        echo "  KUBE_CONTEXT     = {{.KUBE_CONTEXT}}"
        echo "  HARBOR_REGISTRY  = ${HARBOR_REGISTRY:-<non défini — config/{{.ENV}}/global.properties>}"
        echo "  HARBOR_PROJECT   = ${HARBOR_PROJECT:-<non défini — config/{{.ENV}}/global.properties>}"
        echo "  IMAGE_TAG        = ${IMAGE_TAG:-<non défini — requis pour qa/prod>}"
        echo "  DB_HOST          = ${DB_HOST:-<non défini>}"

        echo ""
        echo "=== Versions ==="
        java -version 2>&1 | head -1
        mvn -version 2>/dev/null | head -1
        docker version --format 'Docker {{.Server.Version}}' 2>/dev/null || echo "(Docker non démarré)"
        kubectl version --client 2>/dev/null | head -1
        task --version

        echo ""
        if [ "$PASS" = "true" ]; then
          echo "Tous les outils requis sont disponibles"
        else
          echo "Des outils sont manquants — voir ci-dessus"
          exit 1
        fi

  # ── Build ──────────────────────────────────────────────────────────────────
  compile:
    desc: "Compile sans tests (rapide)"
    cmds:
      - "{{.MVN}} compile -q"

  build:
    desc: "Compile + tests + JaCoCo (70%/60% requis)"
    cmds:
      - "{{.MVN}} verify -Dcheckstyle.skip=true -Djacoco.skip=true"

  test:
    desc: "Exécuter les tests avec couverture JaCoCo"
    cmds:
      - "{{.MVN}} test"

  lint:
    desc: "Checkstyle Google Style"
    cmds:
      - "{{.MVN}} checkstyle:checkstyle -q"

  _quality-gate:
    desc: "Porte qualité obligatoire avant push : Checkstyle + Semgrep + JUnit/JaCoCo"
    internal: true
    cmds:
      - task: lint
      - task: semgrep:scan
      - task: build

  coverage:
    desc: "Ouvrir le rapport de couverture JaCoCo"
    cmds:
      - cmd: start target/site/jacoco/index.html
        platforms: [windows]
      - cmd: open target/site/jacoco/index.html
        platforms: [darwin]
      - cmd: xdg-open target/site/jacoco/index.html
        platforms: [linux]

  clean:
    desc: "Nettoyer le répertoire target/"
    cmds:
      - "{{.MVN}} clean"

  # ── Docker ─────────────────────────────────────────────────────────────────
  docker:
    desc: "Build image Docker locale (tag: local)"
    cmds:
      - task: semgrep:scan
      - docker buildx build --sbom=true --provenance=mode=max -t {{.IMAGE}}:local --load .

  docker:push:
    desc: "Push image vers Harbor avec tag commit SHA (variables HARBOR_* dans config/{{.ENV}}/global.properties)"
    deps: [_quality-gate]
    cmds:
      - |
        GLOBAL_CFG="config/{{.ENV}}/global.properties"
        [ -f "$GLOBAL_CFG" ] || { echo "ERREUR: $GLOBAL_CFG manquant"; exit 1; }

        set -a
        . "$GLOBAL_CFG"
        set +a

        : "${HARBOR_REGISTRY:?HARBOR_REGISTRY manquant dans $GLOBAL_CFG}"
        : "${HARBOR_PROJECT:?HARBOR_PROJECT manquant dans $GLOBAL_CFG}"
        : "${HARBOR_USER:?HARBOR_USER manquant dans $GLOBAL_CFG}"
        : "${HARBOR_PASS:?HARBOR_PASS manquant dans $GLOBAL_CFG}"

        IMAGE_REPO="${HARBOR_REGISTRY}/${HARBOR_PROJECT}/{{.SERVICE}}"
        TAG=$(git rev-parse --short HEAD)

        echo "Docker login sur ${HARBOR_REGISTRY} avec ${HARBOR_USER}..."
        echo "${HARBOR_PASS}" | docker login "${HARBOR_REGISTRY}" -u "${HARBOR_USER}" --password-stdin

        docker buildx build --sbom=true --provenance=mode=max \
          -t ${IMAGE_REPO}:${TAG} \
          -t ${IMAGE_REPO}:latest \
          --push .

  push:
    desc: "Alias de docker:push"
    cmds:
      - task: docker:push

  trivy:scan:
    desc: "Scanner l'image avec Trivy (CRITICAL bloque, HIGH documente)"
    cmds:
      - trivy image --severity CRITICAL,HIGH --exit-code 1 {{.IMAGE}}:local

  semgrep:scan:
    desc: "Analyse statique Semgrep (OWASP, Java/Spring, K8s, Dockerfile, secrets)"
    silent: true
    cmds:
      - |
        SEMGREP_BIN=""
        if command -v semgrep >/dev/null 2>&1; then
          SEMGREP_BIN="semgrep"
        else
          APPDATA_UNIX="$(cygpath "$APPDATA" 2>/dev/null || echo "")"
          if [ -n "$APPDATA_UNIX" ]; then
            for PY_VER in Python314 Python313 Python312 Python311 Python310; do
              CANDIDATE="$APPDATA_UNIX/Python/$PY_VER/Scripts/semgrep"
              if [ -x "$CANDIDATE" ]; then
                SEMGREP_BIN="$CANDIDATE"
                break
              fi
            done
          fi
        fi
        if [ -z "$SEMGREP_BIN" ]; then
          echo "ERREUR: semgrep introuvable. Installation : pip install semgrep"
          exit 1
        fi
        echo "Semgrep SAST — {{.SERVICE}}"
        PYTHONUTF8=1 $SEMGREP_BIN scan \
          --config p/owasp-top-ten \
          --config p/cwe-top-25 \
          --config p/security-audit \
          --config p/java \
          --config p/kubernetes \
          --config p/dockerfile \
          --config p/secrets \
          --config p/default \
          --error \
          --include="*.java" \
          --include="*.yml" \
          --include="*.yaml" \
          --include="Dockerfile" \
          .
        echo "Semgrep: aucune faille critique detectee."
  # ── Kubernetes ─────────────────────────────────────────────────────────────
  k8s:
    desc: "Dry-run Kustomize overlay ENV actif (défaut: dev)"
    cmds:
      - "{{{{.KUSTOMIZE}}}} build kustomize/overlays/{{{{.ENV}}}} | kubectl apply --dry-run=client --context={{{{.KUBE_CONTEXT}}}} -f -"

  deploy:
    desc: "Deploy K8s overlay ENV actif (défaut: dev) — qa/prod: définir ENV + IMAGE_TAG dans .env"
    silent: true
    cmds:
      - |
        echo "Deploy — ENV={{{{.ENV}}}}  NAMESPACE={{{{.NAMESPACE}}}}  CONTEXT={{{{.KUBE_CONTEXT}}}}"
        if [ "{{{{.ENV}}}}" != "dev" ]; then
          if [ -z "${{IMAGE_TAG}}" ]; then
            echo "ERREUR: IMAGE_TAG non défini — ajouter IMAGE_TAG=<sha> dans .env"
            exit 1
          fi
          echo "Mise à jour image tag → ${{IMAGE_TAG}}..."
          (cd kustomize/overlays/{{{{.ENV}}}} && {{{{.KUSTOMIZE}}}} edit set image \
            {{{{.IMAGE}}}}={{{{.IMAGE}}}}:${{IMAGE_TAG}})
        fi
        echo "Apply Kustomize overlay {{{{.ENV}}}}..."
        {{{{.KUSTOMIZE}}}} build kustomize/overlays/{{{{.ENV}}}} | kubectl apply -f - --context="{{{{.KUBE_CONTEXT}}}}"
        kubectl rollout status deployment/{{{{.SERVICE}}}} -n {{{{.NAMESPACE}}}} --timeout=300s --context="{{{{.KUBE_CONTEXT}}}}"
        echo "Deploy {{{{.ENV}}}} terminé."

  run:
    desc: "Lancer localement avec le profil Spring = ENV actif (défaut: dev)"
    cmds:
      - "SPRING_PROFILES_ACTIVE={{{{.ENV}}}} {{{{.MVN}}}} spring-boot:run"
