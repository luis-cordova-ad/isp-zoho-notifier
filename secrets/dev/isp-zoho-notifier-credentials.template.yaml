# =============================================================================
# secrets/dev/isp-zoho-notifier-credentials.template.yaml
#
# Template Kubernetes Secret pour isp-zoho-notifier — DEV
# À REMPLIR avec les vrais credentials depuis votre coffre de secrets.
# JAMAIS committer sans le suffixe .template.yaml
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: isp-zoho-notifier-secret
  namespace: isp-app
  labels:
    app: isp-zoho-notifier
    env: dev
type: Opaque
stringData:
  # Zoho CRM OAuth2 — Récupérer depuis console.zoho.com
  ZOHO_CLIENT_ID: "__SET_FROM_VAULT__"
  ZOHO_CLIENT_SECRET: "__SET_FROM_VAULT__"
  ZOHO_REFRESH_TOKEN: "__SET_FROM_VAULT__"

  # RabbitMQ — JAMAIS committer le password réel
  RABBITMQ_PASSWORD: "__SET_FROM_VAULT__"

  # Database (RADIUS freeradius_db) — Credentials applicatif
  DB_PASSWORD: "__SET_FROM_VAULT__"

# À créer depuis ce template :
# 1. Copier ce fichier sans le suffixe .template.yaml
# 2. Remplir les valeurs base64 avec les vrais credentials
# 3. Appliquer : kubectl apply -f secrets/dev/isp-zoho-notifier-credentials.yaml
# 4. Vérifier : kubectl get secret isp-zoho-notifier-secret -n isp-app
