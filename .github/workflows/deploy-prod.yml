name: Deploy PROD

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy to PRODUCTION'
        required: true
      confirmation:
        description: 'Type DEPLOY to confirm production deployment'
        required: true

jobs:
  validate:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: inputs.confirmation != 'DEPLOY'
        run: |
          echo "ERROR: You must type 'DEPLOY' to confirm production deployment. Got: '${{ inputs.confirmation }}'"
          exit 1

  deploy-prod:
    name: Deploy to PROD
    needs: validate
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.7.1

      - name: Configure kubeconfig PROD
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tag
        working-directory: kustomize/overlays/prod
        run: |
          kustomize edit set image harbor.isp.local/isp-prod/isp-zoho-notifier=harbor.isp.local/isp-prod/isp-zoho-notifier:${{ inputs.image_tag }}

      - name: Apply kustomize PROD
        run: kustomize build kustomize/overlays/prod | kubectl apply -f -

      - name: Rollout status
        run: kubectl rollout status deployment/isp-zoho-notifier -n isp-app --timeout=600s

      - name: Post-deploy verification
        run: |
          echo "=== Pods ==="
          kubectl get pods -n isp-app -l app=isp-zoho-notifier
          echo "=== HPA ==="
          kubectl get hpa isp-zoho-notifier -n isp-app
          echo "=== Service ==="
          kubectl get svc isp-zoho-notifier -n isp-app
