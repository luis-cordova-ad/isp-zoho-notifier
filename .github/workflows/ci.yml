name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.7.1

      - name: Kustomize validate DEV
        run: kustomize build kustomize/overlays/dev | kubectl apply --dry-run=client -f -

      - name: Kustomize validate PROD
        run: kustomize build kustomize/overlays/prod | kubectl apply --dry-run=client -f -

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Checkstyle
        run: mvn checkstyle:check -q

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Run tests + JaCoCo
        run: mvn verify

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  semgrep:
    name: Semgrep SAST
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/java
            p/spring
            p/owasp-top-ten

      - name: Custom rules scan
        run: |
          pip install semgrep
          semgrep --config .semgrep.yml src/main/java/ --error

  build:
    name: Build & Push
    needs: [test, semgrep]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      id-token: write  # cosign keyless OIDC
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Maven package
        run: mvn package -DskipTests -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.isp.local
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image
        id: docker-build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            harbor.isp.local/isp-prod/isp-zoho-notifier:${{ github.sha }}
            harbor.isp.local/isp-prod/isp-zoho-notifier:latest
          sbom: true
          provenance: mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      # ── Supply chain: verify golden base + sign this image ─
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify golden base image signature (infra-base-image-java)
        env:
          COSIGN_CERT_IDENTITY_REGEXP: ^https://github\.com/korlu-isp/infra-base-image-java/\.github/workflows/release\.yml@.*$
          COSIGN_CERT_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          cosign verify \
            --certificate-identity-regexp "${COSIGN_CERT_IDENTITY_REGEXP}" \
            --certificate-oidc-issuer "${COSIGN_CERT_OIDC_ISSUER}" \
            harbor.isp.local/isp-prod/java-runtime-base:25-jammy-1.0.0

      - name: Sign pushed image (cosign keyless)
        env:
          DIGEST: ${{ steps.docker-build.outputs.digest }}
        run: |
          cosign sign --yes \
            "harbor.isp.local/isp-prod/isp-zoho-notifier@${DIGEST}"
