name: Deploy DEV

on:
  workflow_run:
    workflows: ["CI"]
    branches: [develop]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest)'
        default: 'latest'
        required: false

jobs:
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 5.7.1

      - name: Configure kubeconfig DEV
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tag
        working-directory: kustomize/overlays/dev
        run: |
          kustomize edit set image harbor.isp.local/isp-prod/isp-zoho-notifier=harbor.isp.local/isp-prod/isp-zoho-notifier:${{ steps.tag.outputs.TAG }}

      - name: Apply kustomize DEV
        run: kustomize build kustomize/overlays/dev | kubectl apply -f -

      - name: Rollout status
        run: kubectl rollout status deployment/isp-zoho-notifier -n isp-app --timeout=300s

      - name: Show pods
        run: kubectl get pods -n isp-app -l app=isp-zoho-notifier
