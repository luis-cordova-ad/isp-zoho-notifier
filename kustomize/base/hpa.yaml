apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: isp-zoho-notifier
  namespace: isp-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: isp-zoho-notifier
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
