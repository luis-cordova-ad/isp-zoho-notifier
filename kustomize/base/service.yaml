# Service ClusterIP — management uniquement (worker interne, pas de route gateway)
# Le port 8080 est exposé uniquement si webhook-enabled=true (via gateway optionnelle)
apiVersion: v1
kind: Service
metadata:
  name: isp-zoho-notifier
  namespace: isp-app
  labels:
    app: isp-zoho-notifier
spec:
  type: ClusterIP
  selector:
    app: isp-zoho-notifier
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: management
      port: 8081
      targetPort: management
      protocol: TCP
