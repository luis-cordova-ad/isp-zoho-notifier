apiVersion: apps/v1
kind: Deployment
metadata:
  name: isp-zoho-notifier
  namespace: isp-app
spec:
  replicas: 1
  template:
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: isp-zoho-notifier
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
